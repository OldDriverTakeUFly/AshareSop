name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check --output-format=github .

      - name: Black check
        # Exclude non-Python-source trees black should not touch (venvs, build
        # artifacts, frontends). Mirrors the local formatting invocation.
        run: |
          black --check \
            --exclude '(\.venv|node_modules|\.git|src/stockhot\.egg-info|dashboard|davis_webui)' \
            .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # stockhot/core/config.py resolves PROJECT_ROOT from the environment and
      # mkdir's data/storage subdirs at import time. Without this override the
      # inherited value (or absence) breaks test collection. Point it at the
      # checkout so the import-time dirs land inside the workspace.
      PROJECT_ROOT: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        # testpaths is auto-resolved from [tool.pytest.ini_options] in
        # pyproject.toml. No PROJECT_ROOT override needed here — it is set
        # at the job level above.
        run: python -m pytest -q
