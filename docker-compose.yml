services:
  backend:
    image: stockhot-backend:latest
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: stockhot-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - PROJECT_ROOT=/app
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8321/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: stockhot-frontend:latest
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: stockhot-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      - FASTAPI_URL=http://localhost:8321
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stockhot-tunnel
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    env_file:
      - .env
    depends_on:
      - frontend
